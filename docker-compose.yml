version: '3.8'

# Nuvho Booking Mask — Local Staging Environment
# Usage:
#   Start:   docker compose up -d
#   Logs:    docker compose logs -f wpcli
#   Stop:    docker compose down
#   Reset:   docker compose down -v   (wipes DB + WP, full clean slate)
#
# Access:
#   Site:    http://localhost:8080
#   Admin:   http://localhost:8080/wp-admin
#   User:    nuvho  |  Password: Hoteliers.200677!

services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wpuser", "-pwppassword"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html

  wpcli:
    build:
      context: ./docker
      dockerfile: Dockerfile
    restart: on-failure
    user: root
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./docker/setup.sh:/setup.sh:ro
    command: sh /setup.sh

volumes:
  db_data:
  wp_data:
